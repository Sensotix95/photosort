<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Dev Access — SortMyPics</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { display:flex; align-items:flex-start; justify-content:center; padding:3rem 1.5rem; }
    .dev-card { max-width:520px; width:100%; }
    .dev-card h1 { font-size:1.3rem; margin-bottom:0.25rem; }
    .dev-card .subtitle { color:var(--muted); font-size:0.88rem; margin-bottom:2rem; }
    .dev-section { margin-bottom:1.75rem; }
    .dev-section h2 { font-size:0.95rem; font-weight:700; margin-bottom:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
    .dl-buttons { display:flex; gap:0.75rem; flex-wrap:wrap; }
    .dl-btn { display:flex; align-items:center; gap:0.6rem; padding:0.7rem 1.1rem;
              background:var(--surface); border:1.5px solid var(--border); border-radius:10px;
              cursor:pointer; text-decoration:none; color:var(--text); font-size:0.88rem;
              font-weight:600; transition:border-color 0.15s; }
    .dl-btn:hover { border-color:var(--accent); text-decoration:none; }
    .dl-btn small { font-weight:400; color:var(--muted); font-size:0.78rem; display:block; }
    #login-status { font-size:0.88rem; color:var(--muted); margin-bottom:1.5rem; }
  </style>
</head>
<body>
<div class="dev-card card">
  <h1>Dev Page</h1>
  <p class="subtitle">Internal testing only — not indexed, not linked from anywhere.</p>

  <p id="login-status">Logging in…</p>

  <div class="dev-section">
    <h2>Quick actions</h2>
    <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
      <a href="/" class="btn btn-primary" style="text-decoration:none;">Open app →</a>
      <a href="/download" class="btn btn-secondary" style="text-decoration:none;">Download page →</a>
    </div>
  </div>

  <div class="dev-section">
    <h2>Download desktop app</h2>
    <p style="font-size:0.85rem; color:var(--muted); margin-bottom:0.85rem;">
      Download links from <code>/api/download/urls</code>. Empty until first Electron build is published.
    </p>
    <div id="dl-buttons" class="dl-buttons">
      <span style="font-size:0.85rem; color:var(--muted);">Loading…</span>
    </div>
    <p id="dl-version" style="font-size:0.8rem; color:var(--muted); margin-top:0.5rem;"></p>
  </div>
</div>

<script>
  (async () => {
    // Auto-login
    try {
      const res = await fetch('/api/auth/dev-token');
      if (res.ok) {
        const { token } = await res.json();
        localStorage.setItem('photosorter_token', token);
        document.getElementById('login-status').textContent = 'Logged in as dev user.';
      }
    } catch {
      document.getElementById('login-status').textContent = 'Login failed.';
    }

    // Load download URLs
    try {
      const res  = await fetch('/api/download/urls');
      const data = await res.json();
      const container = document.getElementById('dl-buttons');
      container.innerHTML = '';

      const entries = [
        { icon: '🪟', os: 'Windows', format: '.exe installer', url: data.windows },
        { icon: '🍎', os: 'macOS',   format: '.dmg disk image', url: data.mac },
      ];

      for (const { icon, os, format, url } of entries) {
        const a = document.createElement('a');
        a.className = 'dl-btn';
        a.href      = url || '#';
        if (!url) { a.style.opacity = '0.45'; a.style.pointerEvents = 'none'; }
        a.innerHTML = `<span style="font-size:1.4rem">${icon}</span><span>Download for ${os}<small>${url ? format : 'Not yet available'}</small></span>`;
        container.appendChild(a);
      }

      if (data.version) {
        document.getElementById('dl-version').textContent = `Version: ${data.version}`;
      }
    } catch {
      document.getElementById('dl-buttons').innerHTML = '<span style="font-size:0.85rem; color:var(--muted);">Could not load download URLs.</span>';
    }
  })();
</script>
</body>
</html>
