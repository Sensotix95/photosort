<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Dev Access — SortMyPics</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f6fa; color: #6b7280; }
    p { font-size: 0.95rem; }
  </style>
</head>
<body>
<p>Logging in…</p>
<script>
  (async () => {
    try {
      const res = await fetch('/api/auth/dev-token');
      if (res.ok) {
        const { token } = await res.json();
        localStorage.setItem('photosorter_token', token);
      }
    } catch {}
    window.location.replace('/');
  })();
</script>
</body>
</html>
