<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Payment Complete — SortMyPics</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f6fa; color: #6b7280; }
    p { font-size: 0.95rem; }
  </style>
  <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body>
<p>Payment confirmed. Returning to SortMyPics…</p>
<script>
  const sessionId = new URLSearchParams(location.search).get('session_id');
  if (sessionId) {
    if (window.parent !== window) {
      // Loaded inside Stripe's embedded checkout iframe — notify parent
      window.parent.postMessage(
        { type: 'PAYMENT_SUCCESS', sessionId },
        window.location.origin
      );
    } else {
      // Loaded directly (fallback redirect flow) — go home with session_id
      window.location.href = '/?session_id=' + encodeURIComponent(sessionId);
    }
  }
</script>
</body>
</html>
